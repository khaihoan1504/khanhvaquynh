<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f0c20;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            flex-direction: column;
        }

        /* Hiệu ứng nền mờ ảo nhẹ nhàng */
        .background-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.2) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(30px);
        }

        /* Khung nội dung chính */
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 450px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Trái tim lớn đập theo nhịp */
        .big-heart {
            font-size: 4rem;
            color: #ff416c;
            margin: 15px 0;
            animation: heartbeat 1.2s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.15); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Hiệu ứng chữ chạy */
        .quote-box {
            min-height: 80px;
            font-size: 1.2rem;
            font-style: italic;
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            background-color: #ff4b2b;
            animation: blink 0.6s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Nút tương tác */
        .btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            padding: 12px 28px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 65, 108, 0.4);
        }

        /* Hiệu ứng tim rơi */
        .heart-fall {
            position: absolute;
            color: rgba(255, 65, 108, 0.6);
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 2;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* --- SỬA LẠI COPYRIGHT: BÌNH THƯỜNG, RÕ RÀNG --- */
        .copyright {
            z-index: 20;
            text-align: center;
            font-size: 1.3rem; /* To vừa đủ nhìn rõ */
            font-weight: 600; /* Đậm nét vừa phải */
            color: rgba(255, 255, 255, 0.7); /* Màu trắng mờ tinh tế, không chói */
            text-shadow: none; /* Xóa sạch bóng neon màu hồng */
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        <h1>Anh ♥ Em</h1>
        <div class="big-heart">❤️</div>
        <div class="quote-box">
            <span id="text-space"></span><span class="cursor">|</span>
        </div>
        <button class="btn" onclick="changeQuote()">Nhận một chút ngọt ngào</button>
    </div>

    <!-- Hiển thị chữ trần bình thường rõ ràng -->
    <div class="copyright">@phamcongkhaihoan</div>

    <script>
        const quotes = [
            "Anh sinh ra không phải để chạy trốn định mệnh, mà là để gặp và yêu em.",
            "Trái đất có hơn 8 tỉ người, nhưng thế giới của anh thì chỉ thu bé lại vừa bằng em.",
            "Bầu trời xanh, làn mây trắng. Anh không say nắng, nhưng lại say em.",
            "Dự báo thời tiết nói hôm nay trời hanh khô, nhưng gặp em là anh thấy tim mình tan chảy.",
            "Nếu cuộc đời là một bài toán khó, anh nguyện dành cả thanh xuân để tìm ra đáp án là em.",
            "Gọi em là hoàng hôn, vì phải chờ đến cuối ngày anh mới có được khoảnh khắc đẹp nhất.",
            "Người ta thích cúp vàng chiến thắng, còn anh thì chỉ muốn 'cúp' luôn trái tim em thôi."
        ];

        let currentIdx = 0;
        let isTyping = false;

        function typeWriter(text, i, callback) {
            if (i < text.length) {
                document.getElementById("text-space").innerHTML = text.substring(0, i + 1);
                setTimeout(function() {
                    typeWriter(text, i + 1, callback)
                }, 50);
            } else if (typeof callback == 'function') {
                setTimeout(callback, 700);
            }
        }

        function changeQuote() {
            if (isTyping) return;
            isTyping = true;
            
            let nextIdx = Math.floor(Math.random() * quotes.length);
            while (nextIdx === currentIdx) {
                nextIdx = Math.floor(Math.random() * quotes.length);
            }
            currentIdx = nextIdx;

            typeWriter(quotes[currentIdx], 0, function() {
                isTyping = false;
            });
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-fall');
            
            const heartIcons = ['❤️', '💖', '💗', '💕', '🥰'];
            heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 300);

        window.onload = function() {
            typeWriter(quotes[0], 0, function() {
                isTyping = false;
            });
        };
    </script>
</body>
</html>
