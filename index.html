<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khánh ♥ Quỳnh - Our Love Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f0c20;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* Hiệu ứng nền mờ ảo */
        .background-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.4) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(30px);
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.9;
            }
        }

        /* Khung nội dung chính */
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 450px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 65, 108, 0.3);
        }

        /* Trái tim lớn đập theo nhịp */
        .big-heart {
            font-size: 4rem;
            color: #ff416c;
            margin: 20px 0;
            animation: heartbeat 1.2s infinite;
            display: inline-block;
            filter: drop-shadow(0 0 15px #ff416c);
        }

        @keyframes heartbeat {
            0% {
                transform: scale(1);
            }

            20% {
                transform: scale(1.15);
            }

            40% {
                transform: scale(1);
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Hiệu ứng chữ chạy */
        .quote-box {
            min-height: 80px;
            font-size: 1.2rem;
            font-style: italic;
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            background-color: #ff4b2b;
            animation: blink 0.6s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }

        /* Nút tương tác */
        .btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            padding: 12px 28px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 65, 108, 0.6);
        }

        /* Hiệu ứng tim rơi */
        .heart-fall {
            position: absolute;
            color: rgba(255, 65, 108, 0.7);
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 2;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Bản quyền footer */
        .copyright {
            position: absolute;
            bottom: 15px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div class="background-glow"></div>

    <div class="container">
        <h1>Khánh ♥ Quỳnh</h1>
        <div class="big-heart">❤️</div>
        <div class="quote-box">
            <span id="text-space"></span><span class="cursor">|</span>
        </div>
        <button class="btn" onclick="changeQuote()">Bấm để nhận thính cực mạnh</button>
    </div>

    <!-- Bản quyền yêu cầu -->
    <div class="copyright">@phamcongkhaihoan</div>

    <script>
        // Danh sách câu thả thính/tỏ tình của Khánh và Quỳnh
        const quotes = [
            "Khánh sinh ra không phải để chạy trốn định mệnh, mà là để yêu Quỳnh.",
            "Trái đất có 8 tỉ người, nhưng tim Khánh chỉ chừa đúng một chỗ cho Quỳnh thôi.",
            "Quỳnh có biết tại sao Khánh thích chụp ảnh không? Vì Khánh muốn lưu giữ mọi khoảnh khắc có Quỳnh.",
            "Dự báo thời tiết nói hôm nay trời hanh khô, nhưng gặp Quỳnh là Khánh thấy tim 'sũng nước'.",
            "Nếu Quỳnh là một bài toán khó, Khánh nguyện dành cả đời để tìm lời giải.",
            "Gọi Quỳnh là hoàng hôn, vì phải kết thúc một ngày Khánh mới có được Quỳnh.",
            "Người ta thích cúp vàng, còn Khánh thì chỉ thích 'cúp' luôn tim Quỳnh."
        ];

        let currentIdx = 0;
        let isTyping = false;

        function typeWriter(text, i, callback) {
            if (i < text.length) {
                document.getElementById("text-space").innerHTML = text.substring(0, i + 1);
                setTimeout(function () {
                    typeWriter(text, i + 1, callback)
                }, 50);
            } else if (typeof callback == 'function') {
                setTimeout(callback, 700);
            }
        }

        function changeQuote() {
            if (isTyping) return;
            isTyping = true;

            // Chọn ngẫu nhiên hoặc theo thứ tự câu tiếp theo
            let nextIdx = Math.floor(Math.random() * quotes.length);
            while (nextIdx === currentIdx) {
                nextIdx = Math.floor(Math.random() * quotes.length);
            }
            currentIdx = nextIdx;

            typeWriter(quotes[currentIdx], 0, function () {
                isTyping = false;
            });
        }

        // Hiệu ứng tạo mưa tim rơi tự động
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-fall');

            // Random hình dáng tim khác nhau
            const heartIcons = ['❤️', '💖', '💗', '💕', '🥰'];
            heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s"; // từ 2s đến 5s
            heart.style.fontSize = Math.random() * 15 + 15 + "px"; // kích thước ngẫu nhiên

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Tự động rơi tim mỗi 300ms
        setInterval(createHeart, 300);

        // Chạy câu đầu tiên khi load trang
        window.onload = function () {
            typeWriter(quotes[0], 0, function () {
                isTyping = false;
            });
        };
    </script>
</body>

</html>
